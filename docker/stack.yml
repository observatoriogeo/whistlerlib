# Docker Swarm production stack — the long-promised deployment story.
#
#   docker stack deploy -c docker/stack.yml whistlerlib
#
# Whistlerlib publishes ONE custom image: `whistlerlib/worker`. The scheduler
# is the upstream Dask image — Whistlerlib's scheduler runs no whistlerlib
# code, so there's nothing custom to bake in.
#
# `VERSION` env var picks the worker image tag (matches Docker Hub releases):
#   VERSION=1.0.0 docker stack deploy -c docker/stack.yml whistlerlib
# `DASK_IMAGE` picks the scheduler image; default tracks `dask` in `uv.lock`
# so master + worker speak the same wire protocol.

version: "3.9"

networks:
  whistlerlib:
    driver: overlay
    attachable: true

services:
  master:
    image: ${DASK_IMAGE:-daskdev/dask:2026.3.0-py3.11}
    command: ["dask-scheduler", "--dashboard-prefix", "/dask"]
    networks:
      - whistlerlib
    ports:
      - "8786:8786"   # Dask scheduler
      - "8787:8787"   # Dashboard
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.role==manager"
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5

  worker:
    image: whistlerlib/worker:${VERSION:-latest}
    networks:
      - whistlerlib
    command: ["tcp://master:8786"]
    deploy:
      replicas: 4
      placement:
        constraints:
          - "node.role==worker"
        preferences:
          # Spread workers across worker nodes.
          - spread: node.labels.zone
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
