# Local single-host stack for development / smoke testing.
#
#   docker compose -f docker/docker-compose.yml up --build
#
# For a multi-host production deploy, use `docker/stack.yml` (Swarm) instead.

services:
  master:
    # The Dask scheduler is the upstream maintained image — no whistlerlib
    # dependencies live here. Pin tracks `dask` in `uv.lock` (currently
    # 2026.3.0) so scheduler and worker speak the same wire protocol.
    image: daskdev/dask:2026.3.0-py3.11
    container_name: whistlerlib-master
    command: ["dask-scheduler", "--dashboard-prefix", "/dask"]
    networks:
      - whistlerlib
    # Scheduler + dashboard, bound to localhost only.
    ports:
      - "127.0.0.1:8786:8786"
      - "127.0.0.1:8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'from dask.distributed import Client; Client(\"tcp://127.0.0.1:8786\", timeout=5).close()'"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 5s

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    image: whistlerlib/worker:dev
    networks:
      - whistlerlib
    depends_on:
      master:
        condition: service_healthy
    # Two workers locally — matches the test fixture's LocalCluster size.
    deploy:
      replicas: 2
    # Pass the scheduler address via CMD override (matches the master service name).
    command: ["tcp://master:8786"]

networks:
  whistlerlib:
    driver: bridge
