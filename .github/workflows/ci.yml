name: CI

on:
  push:
    branches: ["main", "development", "modernization"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify uv.lock is up to date
        run: uv lock --locked

      - name: Sync deps (dev extras)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run unit tests with coverage gate
        # Unit-only run: fast (~10s) and gated on coverage ≥80% (fail_under
        # in [tool.coverage.report]). Generates an HTML report for upload.
        run: uv run pytest tests/unit/ --cov=src/whistlerlib --cov-report=term --cov-report=html --tb=short

      - name: Upload coverage HTML report
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Run integration tests
        # Phase 2's integration suite (LocalCluster-backed, not Docker).
        # Excluded from default `pytest` via `testpaths` in pyproject.toml so
        # local dev iteration stays fast; we run it explicitly here.
        # `-m 'not slow'` is the default via [tool.pytest.ini_options];
        # R-bridge tests skip automatically (WHISTLERLIB_R_* env vars not
        # set in CI — R lives only in the worker Docker image, Phase 5).
        # No --cov here: coverage is enforced on the unit suite only.
        run: uv run pytest tests/ --ignore=tests/unit --tb=short

  docker-examples:
    # Phase 4 example tests, each against a real local Docker cluster
    # (compose-managed by examples/conftest.py). Heavy: needs the
    # `whistlerlib/worker:dev` image which takes ~5–10 min to build the
    # first time.
    #
    # Triggers (see `if:` below):
    #   * `workflow_dispatch` — manual button for ad-hoc PR / branch testing
    #   * `push` to `main`  — validates every merge to main without slowing
    #     PR / feature-branch runs (lint+unit only on those)
    name: docker-backed example tests
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync deps (dev extras)
        run: uv sync --extra dev --python 3.11

      - name: Build whistlerlib/worker:dev
        # Tag must match `WORKER_IMAGE` in examples/conftest.py; otherwise
        # the conftest fixture detects "image missing" and rebuilds it,
        # doubling the CI cost.
        run: env DOCKER_BUILDKIT=1 docker build -f docker/Dockerfile.worker -t whistlerlib/worker:dev .

      - name: Run docker-backed example tests
        # `-m "docker and not slow"` runs 6 of the 7 examples (everything
        # except the sentiment one, which is also marked `slow` because of
        # the TensorFlow model load — opt in separately if needed).
        run: uv run pytest examples/ -m "docker and not slow" --tb=short
