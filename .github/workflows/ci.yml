name: CI

on:
  push:
    branches: ["main", "development", "modernization"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify uv.lock is up to date
        run: uv lock --locked

      - name: Sync deps (dev extras)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests
        # `-m 'not slow'` is already the default via [tool.pytest.ini_options].
        # R-bridge tests skip automatically — WHISTLERLIB_R_* env vars are not
        # set in CI (R lives only in the worker Docker image, see Phase 5).
        run: uv run pytest --tb=short
