name: CI

on:
  push:
    branches: ["main", "development", "modernization"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify uv.lock is up to date
        run: uv lock --locked

      - name: Sync deps (dev extras)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run unit tests with coverage gate
        # Unit-only run: fast (~10s) and gated on coverage ≥80% (fail_under
        # in [tool.coverage.report]). Generates an HTML report for upload.
        run: uv run pytest tests/unit/ --cov=src/whistlerlib --cov-report=term --cov-report=html --tb=short

      - name: Upload coverage HTML report
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Run integration tests
        # Full default suite (excluding `slow` and R-skipped via env-var gating).
        # `-m 'not slow'` is already the default via [tool.pytest.ini_options].
        # R-bridge tests skip automatically — WHISTLERLIB_R_* env vars are not
        # set in CI (R lives only in the worker Docker image, see Phase 5).
        # No --cov here: coverage is enforced on the unit suite only;
        # integration coverage is informational for Phase 4.
        run: uv run pytest tests/ --ignore=tests/unit --tb=short
